name: Release

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Update Version in TOC and Push
        run: |
          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Replace the version line in the .toc file
          sed -i "s/^## Version: .*/## Version: ${{ github.ref_name }}/g" AltManager-Epoch.toc
          
          # Check if there are changes to commit
          if git diff --quiet AltManager-Epoch.toc; then
            echo "No changes to TOC file"
          else
            git add AltManager-Epoch.toc
            git commit -m "chore: update version to ${{ github.ref_name }} [skip ci]"
            git push origin HEAD:main
          fi

      - - name: Build zip
        run: |
          # 1. Grab the absolute path of your current repo folder before changing directories
          REPO_ROOT=$(pwd)
          
          # 2. Create an isolated staging directory completely outside the repo
          mkdir -p ../staging/AltManager-Epoch
          
          # 3. Cleanly sync file components to the staging environment
          rsync -av --exclude='.git' --exclude='.github' --exclude='.gitignore' \
            --exclude='.gitattributes' --exclude='.pkgmeta' --exclude='SoftRes' \
            . ../staging/AltManager-Epoch/
            
          # 4. Jump to the staging directory to zip it up
          cd ../staging
          
          # 5. Save the output directly back into your original repo root path
          zip -r "$REPO_ROOT/AltManager-Epoch.zip" AltManager-Epoch/

      - name: Create Versioned GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AltManager-Epoch.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Latest Tag
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Update Latest GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AltManager-Epoch.zip
          tag_name: latest
          name: Latest Release
          body: "This release always contains the most recent version (${{ github.ref_name }})."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
